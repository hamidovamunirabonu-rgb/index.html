<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilim CRM - O'quv Markazi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
</head>
<body class="bg-gray-100 font-sans">

    <div id="login-page" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-96">
            <h2 class="text-3xl font-bold text-center text-blue-600 mb-6">Bilim CRM</h2>
            <input type="password" id="admin-pass" placeholder="Admin paroli" class="w-full p-3 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="login()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">Kirish</button>
            <p id="login-error" class="text-red-500 text-sm mt-2 hidden text-center">Xato parol!</p>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <nav class="bg-blue-600 text-white p-4 shadow-lg flex justify-between items-center">
            <h1 class="text-xl font-bold"><i class="fas fa-university mr-2"></i>Bilim CRM</h1>
            <button onclick="logout()" class="bg-red-500 px-4 py-2 rounded-lg hover:bg-red-600">Chiqish</button>
        </nav>

        <div class="container mx-auto p-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-xl shadow-md">
                    <h3 class="text-lg font-bold mb-4 border-b pb-2">Yangi O'quvchi</h3>
                    <input type="text" id="std-name" placeholder="Ism Familiya" class="w-full p-2 border rounded mb-3">
                    <select id="std-group" class="w-full p-2 border rounded mb-3">
                        <option value="Matematika">Matematika</option>
                        <option value="Ingliz tili">Ingliz tili</option>
                        <option value="Ona tili">Ona tili</option>
                    </select>
                    <button onclick="addStudent()" class="w-full bg-green-500 text-white py-2 rounded hover:bg-green-600">Qo'shish</button>
                </div>

                <div class="md:col-span-2 bg-white p-6 rounded-xl shadow-md">
                    <h3 class="text-lg font-bold mb-4 border-b pb-2">O'quvchilar Ro'yxati</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="bg-gray-50 text-gray-600 uppercase text-sm">
                                    <th class="p-3">Ism</th>
                                    <th class="p-3">Fan</th>
                                    <th class="p-3">To'lov</th>
                                    <th class="p-3">Amal</th>
                                </tr>
                            </thead>
                            <tbody id="student-list">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // SIZNING FIREBASE MA'LUMOTLARINGIZ
        const firebaseConfig = {
            apiKey: "AIzaSyAk_5A1NI8rEI-RPEy5-SmVHQl_MgVthnY",
            authDomain: "bilim-crm-90d31.firebaseapp.com",
            projectId: "bilim-crm-90d31",
            storageBucket: "bilim-crm-90d31.firebasestorage.app",
            messagingSenderId: "916429053971",
            appId: "1:916429053971:web:3ce6cab1bc431103739fe6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // LOGIN FUNKSIYASI
        window.login = function() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === "1234") { // Parol: 1234
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadStudents();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        window.logout = function() {
            location.reload();
        }

        // O'QUVCHI QO'SHISH
        window.addStudent = async function() {
            const name = document.getElementById('std-name').value;
            const group = document.getElementById('std-group').value;

            if (name) {
                await addDoc(collection(db, "students"), {
                    name: name,
                    group: group,
                    paid: false,
                    date: new Date().toLocaleDateString()
                });
                document.getElementById('std-name').value = "";
                loadStudents();
            }
        }

        // MA'LUMOTLARNI YUKLASH
        async function loadStudents() {
            const querySnapshot = await getDocs(collection(db, "students"));
            const list = document.getElementById('student-list');
            list.innerHTML = "";
            
            querySnapshot.forEach((docSnap) => {
                const std = docSnap.data();
                const statusColor = std.paid ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700';
                const statusText = std.paid ? 'To\'langan' : 'Qarz';

                list.innerHTML += `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="p-3 font-medium">${std.name}</td>
                        <td class="p-3 text-sm text-gray-600">${std.group}</td>
                        <td class="p-3">
                            <span onclick="togglePayment('${docSnap.id}', ${std.paid})" class="cursor-pointer px-3 py-1 rounded-full text-xs font-bold ${statusColor}">
                                ${statusText}
                            </span>
                        </td>
                        <td class="p-3">
                            <button onclick="deleteStudent('${docSnap.id}')" class="text-red-500 hover:text-red-700">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        // TO'LOV HOLATINI O'ZGARTIRISH
        window.togglePayment = async function(id, currentStatus) {
            const stdRef = doc(db, "students", id);
            await updateDoc(stdRef, { paid: !currentStatus });
            loadStudents();
        }

        // O'QUVCHINI O'CHIRISH
        window.deleteStudent = async function(id) {
            if(confirm("Haqiqatan ham o'chirmoqchimisiz?")) {
                await deleteDoc(doc(db, "students", id));
                loadStudents();
            }
        }
    </script>
</body>
</html>
